name: Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh OpenDB catalog shards
        run: npm run catalog

      - name: Install and test
        run: |
          npm ci
          npm test

      - name: Commit catalog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/catalog src/data/catalog-revision.json
          if git diff --staged --quiet; then
            echo "No catalog changes"
            exit 0
          fi
          git commit -m "chore: refresh BuildCores OpenDB catalog snapshot"
          git push
